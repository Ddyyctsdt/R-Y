name: YouTube Bale Bot (3h cycle)

on:
  schedule:
    # هر ۳ ساعت یک‌بار: 
    # دقیقه ۰ در ساعت‌های ۰, ۳, ۶, ۹, ۱۲, ۱۵, ۱۸, ۲۱ (UTC)
    - cron: '0 */3 * * *'

  # اجازه اجرای دستی از تب Actions
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    # حداکثر زمان اجرای هر Job: ۳ ساعت (۱۸۰ دقیقه)
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests scrapetube playwright
          python -m playwright install --with-deps chromium

      - name: Run bot (3 hours)
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          DEBUG: "0"
        run: |
          python Bot.py
